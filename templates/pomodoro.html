<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pomodoro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<div class="page-bg"></div>

<div class="shell">

    <header class="glass-nav">
        <div class="nav-left">
            <div class="logo-icon">
                <i id="weather-icon" data-lucide="cloud"></i>
            </div>
            <div class="logo-text">MoodWeather</div>
        </div>

        <nav class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/#about" class="nav-link">About Project</a>
            <a href="/api" class="nav-link" rel="documentation">API Docs</a>
            <a href="/pomodoro" class="nav-link active">Pomodoro</a>
        </nav>
    </header>

    <main class="glass-main pomodoro-glass-main">
        <div class="pomodoro-page-wrapper">
            <div class="pomodoro-inner">
                <div class="pomodoro-topline">
                    <div class="pomodoro-brand-block">
                        <div class="pomodoro-mini-brand">Focus Mode</div>
                    </div>

                    <div class="pomodoro-quote-inline">
                        “Life begins at the end of your comfort zone, keep going and never give up!”
                    </div>
                </div>

                <div class="pomodoro-center">
                    <h1 class="pomodoro-task">Focus session</h1>

                    <div id="timer" class="pomodoro-timer">25:00</div>

                    <div class="pomodoro-controls">
                        <button class="pomodoro-main-btn" onclick="startTimer()">Start</button>
                        <button class="pomodoro-icon-btn" onclick="pauseTimer()">Pause</button>
                        <button class="pomodoro-icon-btn" onclick="resetTimer()">Reset</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
    lucide.createIcons();
</script>
<script src="/static/pomodoro.js"></script>
</body>
</html>
