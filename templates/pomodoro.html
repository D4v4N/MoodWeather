<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pomodoro</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<div class="glass-main">
    <h1>Pomodoro Timer</h1>

    <div id="timer" style="font-size: 3rem; margin: 20px 0;">
        25:00
    </div>

    <button class="primary-btn" onclick="startTimer()">Start</button>
    <button class="secondary-btn" onclick="pauseTimer()">Pause</button>
    <button class="secondary-btn" onclick="resetTimer()">Reset</button>
</div>

<script src="/static/pomodoro.js"></script>

</body>
</html>
